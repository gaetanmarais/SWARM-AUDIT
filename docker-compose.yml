services:
  arcis-swarm:
    build: .
    container_name: arcis-swarm
    restart: unless-stopped
    ports:
      - "8099:8000"
    volumes:
      # Mount a directory — never a bare file, to avoid Docker creating a dir
      # on first run when the file doesn't yet exist.
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - SWARM_DATA_DIR=/app/data
