services:
  arcis-swarm:
    build:
      context: .
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
    container_name: arcis-swarm
    restart: unless-stopped
    ports:
      - "8099:8000"
    volumes:
      # Mount a directory — never a bare file, to avoid Docker/Podman creating a dir
      # on first run when the file doesn't yet exist.
      # :Z relabels the host dir for SELinux (required on RHEL/Fedora/Podman hosts)
      - ./data:/app/data:Z
    environment:
      - PYTHONUNBUFFERED=1
      - SWARM_DATA_DIR=/app/data
